name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
    tags: [ "*.*.*" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src/

  validate:
    needs: [ lint ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13" ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest --cov=b2500_meter --cov-report=xml --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  build:
    needs: [ validate ]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        config:
          - platform: linux/amd64
            cache_scope: base-linux-amd64
          - platform: linux/arm/v7
            cache_scope: base-linux-arm-v7
          - platform: linux/arm64
            cache_scope: base-linux-arm64
    uses: ./.github/workflows/build-image.yml
    with:
      registry: ghcr.io
      platform: ${{ matrix.config.platform }}
      cache_scope: ${{ matrix.config.cache_scope }}
      context: .
      dockerfile: ./Dockerfile
      image-suffix: ""
      digest-prefix: "digests-base-"
      push: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

  merge:
    needs: [ build ]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/merge-manifests.yml
    with:
      registry: ghcr.io
      image-suffix: ""
      digest-prefix: "digests-base-"

  build-addon:
    needs: [ validate ]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            cache_scope: addon-linux-amd64
          - platform: linux/arm64
            cache_scope: addon-linux-arm64
    uses: ./.github/workflows/build-image.yml
    with:
      registry: ghcr.io
      platform: ${{ matrix.platform }}
      cache_scope: ${{ matrix.cache_scope }}
      context: .
      dockerfile: ./ha_addon/Dockerfile
      build-args: |
        BUILD_FROM=ghcr.io/hassio-addons/base:17.0.1
      image-suffix: "-addon"
      digest-prefix: "digests-addon-"
      push: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}

  merge-addon:
    needs: [ build-addon ]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/merge-manifests.yml
    with:
      registry: ghcr.io
      image-suffix: "-addon"
      digest-prefix: "digests-addon-"
